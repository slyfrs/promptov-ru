<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="200" height="200" rx="40" fill="url(#grad)"/>
  
  <!-- Нейронная сеть -->
  <!-- Центральный узел -->
  <circle cx="100" cy="100" r="20" fill="white" opacity="0.9"/>
  
  <!-- Соединительные линии -->
  <line x1="100" y1="80" x2="100" y2="50" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="100" y1="120" x2="100" y2="150" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="80" y1="100" x2="50" y2="100" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="120" y1="100" x2="150" y2="100" stroke="white" stroke-width="3" opacity="0.6"/>
  <line x1="80" y1="80" x2="60" y2="60" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="80" x2="140" y2="60" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="80" y1="120" x2="60" y2="140" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="120" x2="140" y2="140" stroke="white" stroke-width="2" opacity="0.4"/>
  
  <!-- Узлы сети -->
  <circle cx="100" cy="50" r="5" fill="white" opacity="0.8"/>
  <circle cx="100" cy="150" r="5" fill="white" opacity="0.8"/>
  <circle cx="50" cy="100" r="5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="100" r="5" fill="white" opacity="0.8"/>
  <circle cx="60" cy="60" r="4" fill="white" opacity="0.6"/>
  <circle cx="140" cy="60" r="4" fill="white" opacity="0.6"/>
  <circle cx="60" cy="140" r="4" fill="white" opacity="0.6"/>
  <circle cx="140" cy="140" r="4" fill="white" opacity="0.6"/>
</svg>